esphome:
  name: 24g-mmwave-pir-sensor-2
  friendly_name: 24G MMWave Sensor 2
  comment: XuiMii XM-HE201 24G MMWave PIR Presence Sensor

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:

api:

ota:
  - platform: esphome
  - platform: web_server
  - platform: http_request
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 15min
  passive_scan: True
  ap:
    ssid: "Xuimii-24G-Mmwave-2"
    password: !secret web_server_password
    ap_timeout: 5min

captive_portal:

web_server:
  auth:
    username: admin
    password: !secret web_server_password

text_sensor:
  - platform: version
    name: "ESPHome Version"
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    mac_address:
      name: "MAC Address"

uart:
  tx_pin: GPIO21
  rx_pin: GPIO20
  baud_rate: 256000
  parity: NONE
  stop_bits: 1

ld2410:
  id: ld2410_radar

number:
  - platform: ld2410
    timeout:
      name: "Presence Timeout"
      id: presence_timeout
    max_move_distance_gate:
      name: "Max Move Distance Gate"
      id: max_move_distance_gate
    max_still_distance_gate:
      name: "Max Still Distance Gate"
      id: max_still_distance_gate

sensor:
  - platform: ld2410
    ld2410_id: ld2410_radar
    moving_distance:
      name: "Moving Distance"
    still_distance:
      name: "Still Distance"
    moving_energy:
      name: "Moving Energy"
    still_energy:
      name: "Still Energy"
    detection_distance:
      name: "Detection Distance"

  - platform: adc
    pin: GPIO1
    name: "Light Level Raw Voltage"
    id: light_voltage
    update_interval: 2s
    attenuation: 12db
    accuracy_decimals: 3
    unit_of_measurement: "V"
    
  - platform: template
    name: "Light Level"
    id: light_level
    device_class: illuminance
    unit_of_measurement: "lx"
    accuracy_decimals: 0
    update_interval: 2s
    lambda: |-
      float voltage = id(light_voltage).state;
      if (voltage < 0.1) return 0;  // Very dark
      // Convert voltage to lux - adjust this formula based on your sensor
      // This is a basic formula - you may need to calibrate
      float lux = (voltage / 3.3) * 1000.0;
      return lux;

binary_sensor:
  - platform: ld2410
    ld2410_id: ld2410_radar
    has_target:
      name: "Presence Detection"

  - platform: gpio
    pin: GPIO7
    name: "PIR Motion"
    device_class: motion

  - platform: gpio
    pin:
      number: GPIO5
      mode: INPUT_PULLUP
      inverted: true
    name: "Physical Button"
    on_click:
      - min_length: 50ms
        max_length: 5s
        then:
          - logger.log: "Short button press - restarting device"
          - button.press: restart_button
      - min_length: 10s
        max_length: 30s
        then:
          - logger.log: "Long button hold - resetting to defaults"
          - button.press: reset_defaults_button
button:
  - platform: restart
    id: restart_button
    name: "Restart Device"
    
  - platform: template
    name: "Default Parameters"
    id: reset_defaults_button
    on_press:
      then:
        # Reset LD2410 settings to defaults
        - number.set:
            id: presence_timeout
            value: 60
        - number.set:
            id: max_move_distance_gate  
            value: 8
        - number.set:
            id: max_still_distance_gate
            value: 8
packages:
  ota_updates: !include includes/ota-updates.yaml

