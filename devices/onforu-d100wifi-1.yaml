esphome:
  name: onforu-d100wifi-1
  friendly_name: onforu-d100wifi-1

bk72xx:
  board: generic-bk7231n-qfn32-tuya
  framework:
    version: latest

logger:
api:
ota:
  - platform: esphome
time:
  - platform: sntp
    timezone: "US/Mountain"
    servers:
      - 192.168.20.1

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  #domain: !secret wifi_domain
  reboot_timeout: 15min
  ap:
    ssid: "onforu-d100wifi-1"
    password: !secret web_server_password

# web_server:
#   auth:
#     username: admin
#     password: !secret web_server_password 
captive_portal:

output:
 - platform: libretiny_pwm
   id: red_output
   pin: PWM4
 - platform: libretiny_pwm
   id: green_output
   pin: PWM2
 - platform: libretiny_pwm
   id: blue_output
   pin: PWM1
 - platform: libretiny_pwm
   id: ct_output1
   pin: PWM0
 - platform: libretiny_pwm
   id: ct_output2
   pin: PWM5

# external_components:
#   - source:
#       type: git
#       url: https://github.com/Cossid/common
#       ref: ddp-libretuya
#     components: [ ddp ]
#     refresh: always

# ddp:

light:
 - platform: rgbww
   restore_mode: RESTORE_DEFAULT_OFF
   name: "Light"
   red: red_output
   green: green_output
   blue: blue_output
   warm_white: ct_output1
   cold_white: ct_output2
   color_interlock: true
   cold_white_color_temperature: 153 mireds
   warm_white_color_temperature: 500 mireds
  #  effects:
  #    - ddp
packages:
  ota_updates: !include includes/ota-updates.yaml

