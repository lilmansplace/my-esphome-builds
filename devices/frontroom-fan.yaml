substitutions:
  device_name: frontroom-fan
  full_name: "Front Room Fan and Light"
  
esphome:
  name: ${device_name}
  friendly_name: ${full_name}
  comment: TreatLife DS03 (ESP)
  project:
    name: Treatlife.DS03_ESP
    version: 1.0.0

esp8266:
  board: esp01_1m
  restore_from_flash: true

preferences:
  flash_write_interval: 5min

logger:
  # https://esphome.io/components/logger

api:

ota:
  - platform: esphome
  - platform: web_server
  - platform: http_request
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 15min
  passive_scan: True
  ap:
    ssid: "front-room-fan"
    password: !secret web_server_password

uart:
  rx_pin: GPIO3
  tx_pin: GPIO1
  baud_rate: 115200

time:
  - platform: sntp
    timezone: "US/Mountain"
    servers:
      - 192.168.20.1

web_server:
  auth:
    username: admin
    password: !secret web_server_password 

tuya:

button:
- platform: restart
  name: Restart

text_sensor:
  - platform: version
    name: "ESPHome Version"
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    mac_address:
      name: "MAC Address"

sensor:
  - platform: wifi_signal
    name: ${full_name} Wifi Signal
    update_interval: 60s

  - platform: uptime
    name: ${full_name} uptime

light:
  - platform: "tuya"
    name: "Front Room Light"
    dimmer_datapoint: 10
    switch_datapoint: 9
    min_value: 100
    max_value: 1000

fan:
  - platform: "tuya"
    name: "Front Room Fan"
    switch_datapoint: 1
    speed_datapoint: 3
    speed_count: 4

select:
  - platform: tuya
    enum_datapoint: 106
    name: Light Model
    optimistic: true
    options:
      0: Mode1
      1: Mode2
      2: Mode3

number:
  - platform: tuya
    number_datapoint: 102
    name: "Front Room Timed Fan Countdown"
    unit_of_measurement: ""
    min_value: 0
    max_value: 1440
    step: 1
  - platform: tuya
    number_datapoint: 103
    name: "Front Room Timed Light Countdown"
    unit_of_measurement: ""
    min_value: 0
    max_value: 1440
    step: 1
  - platform: tuya
    number_datapoint: 105
    name: "Front Room Light Lowest Brightness"
    min_value: 10
    max_value: 1000
    step: 1
  - platform: tuya
    number_datapoint: 108
    name: "Front Room Switch LED Brightness"
    min_value: 0
    max_value: 2
    step: 1
packages:
  ota_updates: !include includes/ota-updates.yaml

