esphome:
  name: halloween-fm-radio-north
  friendly_name: halloween-fm-radio-north

esp8266:
  board: esp01_1m

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Halloween-Fm-Radio-North"
    password: !secret web_server_password

captive_portal:
logger:
api:
ota:
  - platform: esphome
sensor:
time:
- platform: sntp
  timezone: "US/Mountain"
  servers:
    - 192.168.20.1
web_server:
  auth:
    username: admin
    password: !secret web_server_password 
external_components:
  - source: github://catalin2402/esphome-components
    refresh: 1s
    components:
      - tea5767
i2c:
  sda: GPIO4
  scl: GPIO5
tea5767:
  id: radio
  in_japan: false
  frequency: 88.1 Mhz
  level_sensor:
    name: "Station signal"
  mono_sensor:
    name: "Station is mono"
  frequency_sensor:
    name: "Current frequency"
button:
  - platform: template
    name: "set mono"
    id: set_mono
    on_press:
      tea5767.set_mono:
        id: radio
        mono: false
  - platform: template
    name: "set mute"
    id: set_mute
    on_press:
      tea5767.set_mute:
        id: radio
        mute: false
  - platform: template
    name: "88.1"
    id: set_freq_preset1
    on_press:
      tea5767.set_frequency:
        id: radio
        frequency: 88.1 Mhz
  - platform: template
    name: "92.5"
    id: set_freq_preset2
    on_press:
      tea5767.set_frequency:
        id: radio
        frequency: 92.5 Mhz
  - platform: template
    name: "96.3"
    id: set_freq_preset3
    on_press:
      tea5767.set_frequency:
        id: radio
        frequency: 96.3 Mhz
  - platform: template
    name: "97.1"
    id: set_freq_preset4
    on_press:
      tea5767.set_frequency:
        id: radio
        frequency: 97.1 Mhz
  - platform: template
    name: "99.5"
    id: set_freq_preset5
    on_press:
      tea5767.set_frequency:
        id: radio
        frequency: 99.5 Mhz