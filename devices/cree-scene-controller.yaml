esphome:
  name: cree-scene-controller
  friendly_name: cree-scene-controller

bk72xx:
  board: generic-bk7231n-qfn32-tuya

logger:

time:
  - platform: sntp
    timezone: "US/Mountain"
    servers:
      - 192.168.20.1

web_server:
  auth:
    username: admin
    password: !secret web_server_password 
captive_portal:

mdns:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 15min
  ap:
    ssid: ${display_name}AP
    password: !secret web_server_password
  manual_ip:
    static_ip: 192.168.20.179
    gateway: 192.168.20.1
    subnet: 255.255.255.0

button:
- platform: restart
  name: Restart

debug:
  update_interval: 30s

text_sensor:
- platform: debug
  reset_reason:
    name: Reset Reason
- platform: libretiny
  version:
    name: LibreTiny Version
- platform: template
  name: "State"
  id: template_text
- platform: template
  name: "Button 1"
  id: button1
  icon: "mdi:toggle-switch"
  on_value:
    then:
      - if:
          condition:
            text_sensor.state:
              id: button1
              state: "OFF"
          else:
            - delay: 20ms
            - text_sensor.template.publish:
                id: button1
                state: !lambda 'return "OFF";'
- platform: template
  name: "Button 2"
  id: button2
  icon: "mdi:toggle-switch"
  on_value:
    then:
