substitutions:
  name: persondetector1
esphome:
  name: ${name}
esp32:
  board: esp32dev
  framework:
    type: arduino
time:
  - platform: sntp
    timezone: "US/Mountain"
    servers:
      - 192.168.20.1
logger:
api:
  encryption:
    key: !secret api_key
ota:
  - platform: esphome
web_server:
  auth:
    username: admin
    password: !secret web_server_password 
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${name}
    password: !secret wifi_password
captive_portal:
i2c:
  sda: 21
  scl: 22
  scan: true
  id: bus_a
sensor:
  - platform: sen21231
    id: person_count
    name: person_count
    update_interval: 5s