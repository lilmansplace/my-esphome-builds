substitutions:
  device_name: workout-room-fan
  full_name: "Workout Room Fan and Light"

esphome:
  name: ${device_name}
  friendly_name: ${full_name}
  comment: TreatLife DS03 (Bekken)
  project:
    name: Treatlife.DS03_BK7231N
    version: 1.0.0

bk72xx:
  board: generic-bk7231n-qfn32-tuya

logger:
  # https://esphome.io/components/logger

api:

ota:
  - platform: esphome
  - platform: web_server

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 15min
  passive_scan: True
  ap:
    ssid: "workout-room-fan"
    password: !secret web_server_password
    ap_timeout: 15min

uart:
  rx_pin: P10
  tx_pin: P11
  baud_rate: 115200

time:
  - platform: sntp
    timezone: "US/Mountain"
    servers:
      - 192.168.20.1

web_server:
  auth:
    username: admin
    password: !secret web_server_password 

tuya:

button:
- platform: restart
  name: Restart

debug:
  update_interval: 30s

text_sensor:
- platform: debug
  reset_reason:
    name: Reset Reason
- platform: libretiny
  version:
    name: LibreTiny Version
- platform: version
  name: "ESPHome Version"
- platform: wifi_info
  ip_address:
    name: "IP Address"
  mac_address:
    name: "MAC Address"

sensor:
  - platform: wifi_signal
    name: ${full_name} Wifi Signal
    update_interval: 60s

  - platform: uptime
    name: ${full_name} uptime

light:
  - platform: "tuya"
    name: ${full_name} light
    dimmer_datapoint: 6
    switch_datapoint: 101
    min_value: 100
    max_value: 1000

fan:
  - platform: "tuya"
    name: ${full_name} fan
    switch_datapoint: 1
    speed_datapoint: 3
    speed_count: 4

select:
  - platform: tuya
    enum_datapoint: 106
    name: Light Model
    optimistic: true
    options:
      0: Mode1
      1: Mode2
      2: Mode3

number:
  - platform: tuya
    number_datapoint: 102
    name: "Workout Room Timed Fan Countdown"
    unit_of_measurement: ""
    min_value: 0
    max_value: 1440
    step: 1
  - platform: tuya
    number_datapoint: 103
    name: "Workout Room Timed Light Countdown"
    unit_of_measurement: ""
    min_value: 0
    max_value: 1440
    step: 1
  - platform: tuya
    number_datapoint: 105
    name: "Workout Room Lowest Brightness"
    min_value: 10
    max_value: 1000
    step: 1
  - platform: tuya
    number_datapoint: 108
    name: "Workout Room Switch LED Brightness"
    min_value: 0
    max_value: 2
    step: 1